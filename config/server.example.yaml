# MagClaw Web Service configuration.
# Copy or mount this file as /etc/magclaw/server.yaml.

server:
  host: "0.0.0.0"
  port: 6543
  public_url: "https://magclaw.multiego.me"
  deployment: "cloud"
  require_postgres: true

auth:
  providers:
    - type: "email_password"
      label: "Email password"
    - type: "feishu"
      label: "Feishu"
      app_id: "cli_replace_with_feishu_app_id"
      app_secret: "replace-with-feishu-app-secret"
      redirect_uri: "https://magclaw.multiego.me/api/cloud/auth/feishu/callback"

feishu:
  connect:
    enabled: false
    tenant: "feishu"
    app_id: "cli_replace_with_connect_bot_app_id"
    app_secret: "replace-with-connect-bot-app-secret"
    message_mode: "long_connection"
    reply_mode: "card"

database:
  postgres_url: "postgres://magclaw:change-me@postgres:5432/magclaw"
  name: "magclaw_server"
  schema: "magclaw"
  maintenance_database: "postgres"
  create: false
  lock_timeout_ms: 10000
  statement_timeout_ms: 120000
  idle_in_transaction_timeout_ms: 30000
  startup_lock_timeout_ms: 30000
  connect_timeout_ms: 10000
  pool_max: 10

storage:
  attachment_storage: "pvc"
  # Optional. If omitted, MagClaw probes /var/lib/magclaw/uploads first.
  upload_dir: ""
  local_file_storage_fallback: false
  write_state_json: false

knowledge:
  allow_open: false

daemon:
  # local-repo shows: MAGCLAW_REPO_DIR=...; node .../daemon/bin/magclaw-daemon.js
  # npm shows: npx @magclaw/daemon@latest
  connect_command_mode: "npm"
  local_repo_placeholder: "/path/to/magclaw"

email:
  smtp_host: "smtp.example.com"
  smtp_port: 465
  smtp_username: "noreply@example.com"
  smtp_password: "replace-with-secret"
  smtp_tls: false
  from_address: "noreply@example.com"
  from_name: "MagClaw"

llm:
  base_url: "https://model-api.example.com/v1"
  api_key: "replace-with-llm-api-key"
  model: "qwen3.5-flash"

embedding:
  base_url: "https://embedding.example.com/v1"
  api_key: "replace-with-embedding-api-key"
  model: "embedding-model"

zilliz:
  endpoint: "https://zilliz.example.com"
  token: "replace-with-zilliz-token"
  database: "ai_social_memory"
  collection: "magclaw_team_sharing_v1"

rerank:
  url: "https://rerank.example.com/v1/rerank"
  api_key: "replace-with-rerank-api-key"
  candidate_k: 40
  top_n: 5

team_sharing:
  enabled: false

markdown_maintenance:
  enabled: true
  interval_ms: 21600000
  semantic: true

runtime:
  codex_home_source: "~/.codex"
