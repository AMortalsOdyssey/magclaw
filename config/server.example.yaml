# MagClaw Web Service configuration.
# Copy to ~/.magclaw-server/server.yaml for local cloud-mode runs, or mount as
# /etc/magclaw/server.yaml in containers.

server:
  host: "0.0.0.0"
  port: 6543
  public_url: "https://magclaw.multiego.me"
  deployment: "cloud"
  require_postgres: true

auth:
  providers:
    - type: "email_password"
      label: "Email password"
    - type: "feishu"
      label: "Feishu"
      app_id: "cli_replace_with_feishu_app_id"
      app_secret: "replace-with-feishu-app-secret"
      redirect_uri: "https://magclaw.multiego.me/api/cloud/auth/feishu/callback"

database:
  postgres_url: "postgres://magclaw:change-me@postgres:5432/magclaw"
  name: "magclaw_server"
  schema: "magclaw"
  maintenance_database: "postgres"
  create: false
  lock_timeout_ms: 10000
  statement_timeout_ms: 120000
  idle_in_transaction_timeout_ms: 30000
  startup_lock_timeout_ms: 30000
  connect_timeout_ms: 10000
  pool_max: 10

storage:
  attachment_storage: "pvc"
  # Optional. If omitted, MagClaw probes /var/lib/magclaw/uploads first.
  upload_dir: ""
  local_file_storage_fallback: false
  write_state_json: false

daemon:
  # local-repo shows: MAGCLAW_REPO_DIR=...; node .../daemon/bin/magclaw-daemon.js
  # npm shows: npx @magclaw/daemon@latest
  connect_command_mode: "npm"
  local_repo_placeholder: "/path/to/magclaw"

email:
  smtp_host: "smtp.example.com"
  smtp_port: 465
  smtp_username: "noreply@example.com"
  smtp_password: "replace-with-secret"
  smtp_tls: false
  from_address: "noreply@example.com"
  from_name: "MagClaw"

runtime:
  codex_home_source: "~/.codex"
