apiVersion: v1
kind: ConfigMap
metadata:
  name: magclaw-web-config
data:
  server.yaml: |
    server:
      host: "0.0.0.0"
      port: 6543
      public_url: "https://magclaw.example.com"
      deployment: "cloud"
      require_postgres: true
    database:
      postgres_url: "postgres://magclaw:change-me@postgres:5432/magclaw"
      name: "magclaw_server"
      schema: "magclaw"
      maintenance_database: "postgres"
      create: false
      lock_timeout_ms: 10000
      statement_timeout_ms: 120000
      idle_in_transaction_timeout_ms: 30000
      startup_lock_timeout_ms: 30000
      connect_timeout_ms: 10000
      pool_max: 10
    storage:
      attachment_storage: "pvc"
      local_file_storage_fallback: false
      write_state_json: false
    email:
      smtp_host: "smtp.example.com"
      smtp_port: 465
      smtp_tls: false
      smtp_username: "change-me"
      smtp_password: "change-me"
      from_address: "noreply@example.com"
      from_name: "MagClaw"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: magclaw-uploads
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: magclaw-web
  labels:
    app: magclaw-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: magclaw-web
  template:
    metadata:
      labels:
        app: magclaw-web
    spec:
      containers:
        - name: magclaw-web
          image: ghcr.io/your-org/magclaw-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6543
          volumeMounts:
            - name: config
              mountPath: /etc/magclaw
              readOnly: true
            - name: uploads
              mountPath: /var/lib/magclaw/uploads
          startupProbe:
            httpGet:
              path: /api/readyz
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: magclaw-web-config
        - name: uploads
          persistentVolumeClaim:
            claimName: magclaw-uploads
---
apiVersion: v1
kind: Service
metadata:
  name: magclaw-web
spec:
  selector:
    app: magclaw-web
  ports:
    - name: http
      port: 80
      targetPort: http
