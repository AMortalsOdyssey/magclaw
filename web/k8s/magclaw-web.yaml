apiVersion: v1
kind: ConfigMap
metadata:
  name: magclaw-web-config
data:
  server.yaml: |
    server:
      host: "0.0.0.0"
      port: 6543
      public_url: "https://magclaw.multiego.me"
      deployment: "cloud"
      require_postgres: true
    auth:
      providers:
        - type: "email_password"
          label: "Email password"
        - type: "feishu"
          label: "Feishu"
          app_id: "cli_replace_with_feishu_app_id"
          app_secret: "replace-with-feishu-app-secret"
          redirect_uri: "https://magclaw.multiego.me/api/cloud/auth/feishu/callback"
    database:
      postgres_url: "postgres://magclaw:change-me@postgres:5432/magclaw"
      name: "magclaw_server"
      schema: "magclaw"
      maintenance_database: "postgres"
      create: false
      lock_timeout_ms: 10000
      statement_timeout_ms: 120000
      idle_in_transaction_timeout_ms: 30000
      startup_lock_timeout_ms: 30000
      connect_timeout_ms: 10000
      pool_max: 10
    storage:
      attachment_storage: "pvc"
      local_file_storage_fallback: false
      write_state_json: false
    daemon:
      connect_command_mode: "npm"
      local_repo_placeholder: "/path/to/magclaw"
    email:
      smtp_host: "smtp.example.com"
      smtp_port: 465
      smtp_tls: false
      smtp_username: "change-me"
      smtp_password: "change-me"
      from_address: "noreply@example.com"
      from_name: "MagClaw"
    llm:
      base_url: "https://model-api.example.com/v1"
      api_key: "replace-with-llm-api-key"
      model: "qwen3.5-flash"
    embedding:
      base_url: "https://embedding.example.com/v1"
      api_key: "replace-with-embedding-api-key"
      model: "embedding-model"
      preferred_dimension: 1536
    zilliz:
      endpoint: "https://zilliz.example.com"
      token: "replace-with-zilliz-token"
      database: "ai_social_memory"
      collection: "magclaw_team_sharing_v1"
    rerank:
      url: "https://rerank.example.com/v1/rerank"
      api_key: "replace-with-rerank-api-key"
      candidate_k: 40
      top_n: 5
    team_sharing:
      enabled: false
    markdown_maintenance:
      enabled: true
      interval_ms: 21600000
      semantic: true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: magclaw-uploads
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: magclaw-web
  labels:
    app: magclaw-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: magclaw-web
  template:
    metadata:
      labels:
        app: magclaw-web
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: magclaw-web
          image: ghcr.io/your-org/magclaw-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6543
          volumeMounts:
            - name: config
              mountPath: /etc/magclaw
              readOnly: true
            - name: uploads
              mountPath: /var/lib/magclaw/uploads
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    node -e "fetch('http://127.0.0.1:6543/api/internal/drain',{method:'POST'}).catch(()=>{})" >/dev/null 2>&1 || true
                    sleep 5
          startupProbe:
            httpGet:
              path: /api/readyz
              port: http
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 1
      volumes:
        - name: config
          configMap:
            name: magclaw-web-config
        - name: uploads
          persistentVolumeClaim:
            claimName: magclaw-uploads
---
apiVersion: v1
kind: Service
metadata:
  name: magclaw-web
spec:
  selector:
    app: magclaw-web
  ports:
    - name: http
      port: 80
      targetPort: http
