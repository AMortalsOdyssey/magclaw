apiVersion: v1
kind: ConfigMap
metadata:
  name: magclaw-web-config
data:
  HOST: "0.0.0.0"
  PORT: "6543"
  MAGCLAW_DEPLOYMENT: "cloud"
  MAGCLAW_REQUIRE_LOGIN: "1"
  MAGCLAW_ALLOW_SIGNUPS: "1"
  MAGCLAW_ATTACHMENT_STORAGE: "pvc"
  MAGCLAW_UPLOAD_DIR: "/var/lib/magclaw/uploads"
  MAGCLAW_PUBLIC_URL: "https://magclaw.example.com"
  MAGCLAW_MAIL_TRANSPORT: "smtp"
  MAGCLAW_SMTP_HOST: "smtp.example.com"
  MAGCLAW_SMTP_PORT: "465"
  MAGCLAW_SMTP_SECURE: "1"
---
apiVersion: v1
kind: Secret
metadata:
  name: magclaw-web-secret
type: Opaque
stringData:
  MAGCLAW_DATABASE_URL: "postgres://magclaw:change-me@postgres:5432/magclaw"
  MAGCLAW_SESSION_SECRET: "change-me"
  MAGCLAW_MAIL_FROM: "MagClaw <noreply@example.com>"
  MAGCLAW_SMTP_USER: "change-me"
  MAGCLAW_SMTP_PASSWORD: "change-me"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: magclaw-uploads
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: magclaw-web
  labels:
    app: magclaw-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: magclaw-web
  template:
    metadata:
      labels:
        app: magclaw-web
    spec:
      containers:
        - name: magclaw-web
          image: ghcr.io/your-org/magclaw-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6543
          envFrom:
            - configMapRef:
                name: magclaw-web-config
            - secretRef:
                name: magclaw-web-secret
          volumeMounts:
            - name: uploads
              mountPath: /var/lib/magclaw/uploads
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: magclaw-uploads
---
apiVersion: v1
kind: Service
metadata:
  name: magclaw-web
spec:
  selector:
    app: magclaw-web
  ports:
    - name: http
      port: 80
      targetPort: http
